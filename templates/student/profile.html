{% extends "base.html" %}

{% block title %}My Profile - Hostel Room Allocation System{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow border-0">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="fas fa-id-card me-2 text-primary"></i>Edit Profile</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('profile') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name *</label>
                            <input type="text" id="name" name="name" class="form-control" value="{{ current_user.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" value="{{ current_user.email }}" disabled>
                        </div>

                        <div class="mb-4">
                            <label for="contact_no" class="form-label">Contact Number</label>
                            <input type="text" id="contact_no" name="contact_no" class="form-control" value="{{ current_user.contact_no or '' }}" maxlength="15">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-secondary">Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
