{% extends "base.html" %}

{% block title %}Add New Room - Hostel Room Allocation System{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2><i class="fas fa-plus-circle me-2 text-primary"></i>Add New Room</h2>
            <p class="text-muted mb-0">Create a new room entry for hostel allocation.</p>
        </div>
        <a href="{{ url_for('manage_rooms') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back to Rooms
        </a>
    </div>

    <div class="card shadow border-0">
        <div class="card-header bg-white">
            <h5 class="mb-0">Room Details</h5>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('add_room') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="room_number" class="form-label">Room Number *</label>
                        <input type="text" id="room_number" name="room_number" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="room_type" class="form-label">Room Type *</label>
                        <select id="room_type" name="room_type" class="form-select" required>
                            <option value="">Select type</option>
                            <option value="single">Single</option>
                            <option value="double">Double</option>
                            <option value="triple">Triple</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="capacity" class="form-label">Capacity *</label>
                        <input type="number" id="capacity" name="capacity" class="form-control" min="1" max="6" value="2" required>
                    </div>

                    <div class="col-md-6">
                        <label for="floor" class="form-label">Floor</label>
                        <input type="number" id="floor" name="floor" class="form-control" min="0" max="20">
                    </div>

                    <div class="col-12">
                        <label for="amenities" class="form-label">Amenities</label>
                        <textarea id="amenities" name="amenities" class="form-control" rows="3" placeholder="Example: WiFi, Study Table, Attached Bathroom"></textarea>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>Create Room
                    </button>
                    <a href="{{ url_for('manage_rooms') }}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
